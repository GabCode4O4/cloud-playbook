---
# ==============================================================
# PLAY 1 : Configuration dynamique de l'inventaire
# ==============================================================
- name: Préparation de la cible (SSH ou WinRM)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reconstruire l'inventaire avec les bons paramètres de connexion
      add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: "new_vms"
        ansible_user: "etu"
        ansible_password: "etu"
        ansible_become_password: "etu"
        # Paramètres spécifiques pour Windows
        ansible_connection: "{{ 'winrm' if (choix_os in ['Win10', 'WinServer']) else 'ssh' }}"
        ansible_port: "{{ 5986 if (choix_os in ['Win10', 'WinServer']) else 22 }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_transport: ntlm

# ==============================================================
# PLAY 2 : Déploiement des services
# ==============================================================
- name: Installation des services demandés
  hosts: new_vms
  gather_facts: false

  tasks:
    # ----------------------------------------------------------
    # BLOC LINUX : Docker + Conteneurs
    # ----------------------------------------------------------
    - name: "[Linux] Configuration Docker et Services"
      block:
        - name: Attendre la fin de Cloud-Init
          ansible.builtin.raw: cloud-init status --wait
          changed_when: false

        - name: Installation du moteur Docker
          apt:
            name: [docker.io, python3-pip]
            state: present
            update_cache: true

        - name: Lancer Apache (Docker)
          community.docker.docker_container:
            name: web_apache
            image: httpd:latest
            ports: ["80:80"]
            restart_policy: always
          when: "'Apache' in choix_services"

        - name: Lancer MariaDB (Docker)
          community.docker.docker_container:
            name: bdd_mariadb
            image: mariadb:latest
            env:
              MYSQL_ROOT_PASSWORD: "etu"
            ports: ["3306:3306"]
          when: "'MariaDB' in choix_services"
      when: choix_os in ['UbuntuServ', 'Debian']
      become: true

    # ----------------------------------------------------------
    # BLOC WINDOWS : Installation native via Chocolatey
    # ----------------------------------------------------------
    - name: "[Windows] Configuration Services Natifs"
      block:
        - name: Installer Chocolatey (Gestionnaire de paquets)
          win_shell: Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          args:
            creates: C:\ProgramData\chocolatey\bin\choco.exe

        - name: Installer Apache
          win_chocolatey:
            name: apache-httpd
            state: present
          when: "'Apache' in choix_services"

        - name: Installer MariaDB
          win_chocolatey:
            name: mariadb
            state: present
          when: "'MariaDB' in choix_services"
      when: choix_os in ['Win10', 'WinServer']