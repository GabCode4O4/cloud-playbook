---
- name: Préparation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reconstruire
      add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: "new_vms"
        ansible_user: "etu"
        ansible_password: "etu"
        ansible_become_password: "etu"
        ansible_connection: "{{ 'winrm' if (choix_os in ['Win10', 'WinServer']) else 'ssh' }}"
        ansible_port: "{{ 5986 if (choix_os in ['Win10', 'WinServer']) else 22 }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_transport: ntlm
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

    - name: Attendre que WinRM soit prêt (Windows)
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 5986
        delay: 15
        timeout: 600
        state: started
      when: choix_os in ['Win10', 'WinServer']

    - name: Attendre que SSH soit prêt (Linux)
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 5
        timeout: 300
        state: started
      when: choix_os in ['UbuntuServ', 'Debian']

- name: Installation des services
  hosts: new_vms
  gather_facts: false

  tasks:
    - name: "[Linux] Configuration Docker et Services"
      block:
        - name: Attendre la fin de Cloud-Init
          ansible.builtin.raw: cloud-init status --wait
          register: cloudinit_result
          changed_when: false
          failed_when:
            - cloudinit_result.rc != 0
            - "'status: done' not in cloudinit_result.stdout"

        - name: Installation Docker et dépendances
          ansible.builtin.apt:
            name:
              - docker.io
              - python3-pip
              - python3-docker
            state: present
            update_cache: true

        - name: Démarrer et activer Docker
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true

        - name: Lancer Apache
          community.docker.docker_container:
            name: web_apache
            image: httpd:latest
            ports: ["80:80"]
            restart_policy: always
          when: "'Apache' in choix_services"

        - name: Lancer MariaDB
          community.docker.docker_container:
            name: bdd_mariadb
            image: mariadb:latest
            env:
              MARIADB_ROOT_PASSWORD: "etu"
            ports: ["3306:3306"]
            restart_policy: always
          when: "'MariaDB' in choix_services"

        - name: Vérifier qu'Apache répond
          ansible.builtin.uri:
            url: "http://localhost"
            status_code: 200
          when: "'Apache' in choix_services"

        - name: Vérifier que MariaDB répond
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: 3306
            timeout: 30
          when: "'MariaDB' in choix_services"
      when: choix_os in ['UbuntuServ', 'Debian']
      become: true

    - name: "[Windows] Configuration Services Natifs"
      block:
        # === APACHE ===
        - name: Installer Apache via Chocolatey
          chocolatey.chocolatey.win_chocolatey:
            name: apache-httpd
            state: present
          when: "'Apache' in choix_services"

        - name: Ouvrir le firewall pour Apache (port 80)
          ansible.windows.win_powershell:
            script: |
              if (-not (Get-NetFirewallRule -DisplayName "Apache HTTP" -ErrorAction SilentlyContinue)) {
                  New-NetFirewallRule -DisplayName "Apache HTTP" `
                    -Direction Inbound `
                    -LocalPort 80 `
                    -Protocol TCP `
                    -Action Allow
              }
          when: "'Apache' in choix_services"

        - name: Installer MariaDB via Chocolatey
          chocolatey.chocolatey.win_chocolatey:
            name: mariadb
            state: present
          when: "'MariaDB' in choix_services"

        - name: Ouvrir le firewall pour MariaDB (port 3306)
          ansible.windows.win_powershell:
            script: |
              if (-not (Get-NetFirewallRule -DisplayName "MariaDB" -ErrorAction SilentlyContinue)) {
                  New-NetFirewallRule -DisplayName "MariaDB" `
                    -Direction Inbound `
                    -LocalPort 3306 `
                    -Protocol TCP `
                    -Action Allow
              }
          when: "'MariaDB' in choix_services"
      when: choix_os in ['Win10', 'WinServer']