---
- name: Préparation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reconstruire
      add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: "new_vms"
        ansible_user: "etu"
        ansible_password: "etu"
        ansible_become_password: "etu"
        ansible_connection: "{{ 'winrm' if (choix_os in ['Win10', 'WinServer']) else 'ssh' }}"
        ansible_port: "{{ 5986 if (choix_os in ['Win10', 'WinServer']) else 22 }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_transport: ntlm

    - name: Attendre que WinRM soit prêt (Windows)
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 5986
        delay: 15
        timeout: 600
        state: started
      when: choix_os in ['Win10', 'WinServer']

    - name: Attendre que SSH soit prêt (Linux)
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 5
        timeout: 300
        state: started
      when: choix_os in ['UbuntuServ', 'Debian']
- name: Installation des services 
  hosts: new_vms
  gather_facts: false

  tasks:
    - name: "[Linux] Configuration Docker et Services"
      block:
        - name: Attendre la fin de Cloud-Init
          ansible.builtin.raw: cloud-init status --wait
          register: cloudinit_result
          changed_when: false
          failed_when:
            - cloudinit_result.rc != 0
            - "'status: done' not in cloudinit_result.stdout"

        - name: Installation Docker
          apt:
            name: [docker.io, python3-pip]
            state: present
            update_cache: true

        - name: Lancer Apache
          community.docker.docker_container:
            name: web_apache
            image: httpd:latest
            ports: ["80:80"]
            restart_policy: always
          when: "'Apache' in choix_services"

        - name: Lancer MariaDB
          community.docker.docker_container:
            name: bdd_mariadb
            image: mariadb:latest
            env:
              MYSQL_ROOT_PASSWORD: "etu"
            ports: ["3306:3306"]
          when: "'MariaDB' in choix_services"
      when: choix_os in ['UbuntuServ', 'Debian']
      become: true

    - name: "[Windows] Configuration Services Natifs"
      block:
        - name: Installer Apache
          chocolatey.chocolatey.win_chocolatey:
            name: apache-httpd
            state: present
          when: "'Apache' in choix_services"

        - name: Installer MariaDB
          chocolatey.chocolatey.win_chocolatey:
            name: mariadb
            state: present
          when: "'MariaDB' in choix_services"
      when: choix_os in ['Win10', 'WinServer']