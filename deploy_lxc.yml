---
# ==============================================================
# PLAY 1 : Création et initialisation du Conteneur LXC
# ==============================================================
- name: Création de l'environnement LXC Étudiant
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: Installer la librairie proxmoxer (prérequis API)
      ansible.builtin.pip:
        name: proxmoxer
        state: present

    - name: "1. Créer le conteneur LXC (État : Présent)"
      community.proxmox.proxmox:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "400{{ vmid_etudiant }}"
        hostname: "etu-3il-{{ vmid_etudiant }}"
        password: "etudiant" # Minimum 5 caractères pour Proxmox
        ostemplate: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
        unprivileged: true
        cores: 2
        memory: 1024
        swap: 512
        netif: '{"net0":"name=eth0,bridge=vmbr0,ip=172.16.205.{{ vmid_etudiant }}/24,gw=172.16.1.213"}'
        storage: local-lvm
        features: 
          - nesting=1 # Autorise Docker à l'intérieur du LXC
        state: present

    - name: "2. Démarrer le conteneur LXC"
      community.proxmox.proxmox:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "400{{ vmid_etudiant }}"
        hostname: "etu-3il-{{ vmid_etudiant }}"
        state: started

    - name: "[Guacamole] Créer la connexion SSH pour l'étudiant"
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "LXC_Web_{{ vmid_etudiant }}"
        protocol: "ssh"
        hostname: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        username: "root"
        password: "etudiant"
        validate_certs: false
        state: present

    - name: "Attendre le démarrage réseau (30s)"
      ansible.builtin.pause:
        seconds: 30

    - name: "Vérifier la disponibilité du SSH"
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        state: started
        timeout: 120

    - name: Ajouter le LXC à l'inventaire dynamique
      add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: "nouveaux_lxc"
        ansible_user: "root"
        ansible_password: "etudiant"
        ansible_connection: "ssh"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

# ==============================================================
# PLAY 2 : Installation de la Stack Logicielle (Apache, MariaDB, Node)
# ==============================================================
- name: Installation de la pile Web et des outils Dev
  hosts: nouveaux_lxc
  gather_facts: true
  
  tasks:
    - name: Mise à jour du cache APT
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Installation des outils système (Git, Htop, Nano)"
      apt:
        name: ['git', 'curl', 'wget', 'htop', 'unzip', 'nano']
        state: present

    - name: "Installation Web (Apache, MariaDB, PHP)"
      apt:
        name: ['apache2', 'mariadb-server', 'php', 'libapache2-mod-php', 'php-mysql']
        state: present

    - name: "Installation Node.js 20.x"
      block:
        - name: Télécharger le script NodeSource
          ansible.builtin.command: curl -fsSL https://deb.nodesource.com/setup_20.x -o /tmp/nodesource_setup.sh
          args:
            creates: /tmp/nodesource_setup.sh

        - name: Exécuter le script NodeSource
          ansible.builtin.command: bash /tmp/nodesource_setup.sh
          args:
            creates: /etc/apt/sources.list.d/nodesource.list

        - name: Installer Node.js
          apt:
            name: nodejs
            state: present
            update_cache: true

    - name: Démarrage des services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - apache2
        - mariadb