---
- name: Création de l'environnement LXC Étudiant
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: Installer la librairie proxmoxer
      ansible.builtin.pip:
        name: proxmoxer
        state: present

    - name: "1. Créer le conteneur LXC (Éteint)"
      community.proxmox.proxmox:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "400{{ vmid_etudiant }}"
        hostname: "etu-3il-{{ vmid_etudiant }}"
        password: "etudiant"
        ostemplate: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
        unprivileged: true
        cores: 2
        memory: 1024
        swap: 512
        netif: '{"net0":"name=eth0,bridge=vmbr0,ip=172.16.205.{{ vmid_etudiant }}/24,gw=172.16.1.213"}'
        storage: local-lvm
        state: present

    - name: "2. Démarrer le conteneur LXC"
      community.proxmox.proxmox:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "400{{ vmid_etudiant }}"
        hostname: "etu-3il-{{ vmid_etudiant }}"
        state: started

    - name: "2b. Configurer SSH pour Root (LXC Attach)"
      ansible.builtin.shell: |
        pct exec 400{{ vmid_etudiant }} -- sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        pct exec 400{{ vmid_etudiant }} -- systemctl restart ssh
      delegate_to: localhost # Cette commande s'exécute via l'API/Shell de l'hôte
      ignore_errors: true

    - name: Attendre que le LXC soit démarré et le port SSH (22) ouvert
      wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 10
        timeout: 120 # On double le temps pour être serein

    - name: "[Guacamole] Créer la connexion SSH pour l'étudiant"
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "LXC_Web_{{ vmid_etudiant }}"
        protocol: "ssh"
        hostname: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        username: "root"
        password: "etudiant"
        validate_certs: false
        state: present

    - name: Ajouter le LXC à l'inventaire temporaire
      add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: "nouveaux_lxc"
        ansible_user: "root"
        ansible_password: "etudiant"
        ansible_connection: "ssh"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

- name: Installation de la pile Web et des outils Dev
  hosts: nouveaux_lxc
  gather_facts: true
  
  tasks:
    - name: Mise à jour des dépôts APT
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "1. Outils de base (Git, Curl, Htop, Unzip)"
      apt:
        name: ['git', 'curl', 'wget', 'htop', 'unzip', 'nano', 'vim']
        state: present

    - name: "2. Serveur Web & Base de données (Apache + MariaDB)"
      apt:
        name: ['apache2', 'mariadb-server']
        state: present

    - name: "3. Langages de programmation (PHP & Python)"
      apt:
        name: ['php', 'libapache2-mod-php', 'php-mysql', 'python3', 'python3-pip', 'python3-venv']
        state: present

    - name: "4. Environnement Node.js (via script officiel)"
      block:
        - name: Télécharger le script de setup NodeSource
          command: curl -fsSL https://deb.nodesource.com/setup_20.x -o /tmp/nodesource_setup.sh
          args:
            creates: /tmp/nodesource_setup.sh

        - name: Exécuter le script NodeSource
          command: bash /tmp/nodesource_setup.sh
          args:
            creates: /etc/apt/sources.list.d/nodesource.list

        - name: Installer Node.js et NPM
          apt:
            name: nodejs
            state: present
            update_cache: true

    - name: S'assurer que les services critiques sont démarrés
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - apache2
        - mariadb