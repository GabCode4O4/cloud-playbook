---

# ==============================================================

# JEU 1 : PROXMOX (Création de la machine depuis AWX)

# ==============================================================

- name: Déploiement Cloud Étudiant - Phase Création

  hosts: localhost

  connection: local

  gather_facts: false



  vars:

    vmid_etudiant: "50"                      

    newid: "250"

    new_vm_name: "VM-{{ vmid_etudiant }}"                              

  

  tasks:

    - name: Installer proxmoxer (le traducteur Python pour l'API)

      pip:

        name: proxmoxer

        state: present



    - name: Cloner la VM Template et injecter Cloud-Init

      community.proxmox.proxmox_kvm:

        api_host: "{{ pve_api_host }}"

        api_user: "root@pam"

        api_token_id: "{{ pve_api_token_id }}"

        api_token_secret: "{{ pve_api_token_secret }}"

        node: "exbasis"

        vmid: 106

        clone: "VMtest"

        newid: "{{ newid }}"

        validate_certs: false

        name: "{{ new_vm_name }}"

        full: false

        state: present

        ciuser: "root"

        cipassword: "password123"

        net: '{"net0":"virtio,bridge=vmbr0,firewall=0"}'

        ipconfig:

          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"

        force: true



    - name: Injecter l'IP dans la config du clone

      ansible.builtin.uri:

        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/{{ newid }}/config"

        method: POST

        headers:

          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"

        body_format: form-urlencoded

        body:

          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"

        validate_certs: false

        status_code: 200



    - name: Regénérer le disque Cloud-Init

      ansible.builtin.uri:

        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/{{ newid }}/cloudinit"

        method: PUT

        headers:

          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"

        validate_certs: false

        status_code: 200



    - name: Démarrer la nouvelle VM

      community.proxmox.proxmox_kvm:

        api_host: "{{ pve_api_host }}"

        api_user: "root@pam"

        api_token_id: "{{ pve_api_token_id }}"

        api_token_secret: "{{ pve_api_token_secret }}"

        node: "exbasis"

        vmid: "{{ newid }}"

        validate_certs: false

        state: started



    - name: Attendre que le port SSH (22) soit ouvert sur la nouvelle IP

      ansible.builtin.wait_for:

        host: "172.16.205.{{ vmid_etudiant }}"

        port: 22

        delay: 15

        timeout: 300

        state: started



# ==============================================================

# JEU 3 : GUACAMOLE (Création des accès web pour l'étudiant)

# ==============================================================

- name: Intégration de la VM dans la passerelle Guacamole

  hosts: localhost

  connection: local

  gather_facts: false



  vars:

    vmid_etudiant: "50"

    guac_url: "http://172.16.180.250:8080/guacamole"

    guac_admin: "guacadmin"

    guac_pass: "guacadmin"



  tasks:

    - name: 1. Créer la connexion SSH vers la nouvelle VM

      scicore.guacamole.guacamole_connection:

        base_url: "{{ guac_url }}"

        auth_username: "{{ guac_admin }}"

        auth_password: "{{ guac_pass }}"

        connection_name: "Connexion_SSH_VM_{{ vmid_etudiant }}"

        protocol: "ssh"

        hostname: "172.16.205.{{ vmid_etudiant }}"

        port: 22

        username: "root"

        password: "password123"

        validate_certs: false

        state: present



    - name: 2. Créer le compte étudiant et lui lier sa connexion

      scicore.guacamole.guacamole_user:

        base_url: "{{ guac_url }}"

        auth_username: "{{ guac_admin }}"

        auth_password: "{{ guac_pass }}"

        username: "etu_{{ vmid_etudiant }}"

        password: "password123"

        allowed_connections:

          - "Connexion_SSH_VM_{{ vmid_etudiant }}"

        validate_certs: false

        state: present