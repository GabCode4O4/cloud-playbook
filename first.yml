---
# ==============================================================
# JEU 1 : PROXMOX (Création de la machine depuis AWX)
# ==============================================================
- name: Déploiement Cloud Étudiant - Phase Création
  hosts: localhost
  connection: local
  gather_facts: false

  # === VARIABLES EN DUR POUR LE TEST ===
  vars:
    vmid_etudiant: "50"                        # L'IP sera 172.16.205.50
    newid: "250"                               # L'ID de la nouvelle VM dans Proxmox
  
  tasks:
    - name: Installer proxmoxer (le traducteur Python pour l'API)
      pip:
        name: proxmoxer
        state: present

    # --- ÉTAPE 1 : CLONER ET CONFIGURER (SANS ALLUMER) ---
    - name: Cloner la VM Template et injecter Cloud-Init
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: 106
        clone: "VMtest"
        newid: "{{ newid }}"
        name: "{{ new_vm_name }}"
        full: false
        state: present
        ciuser: "etudiant"
        cipassword: "password123"
        net: '{"net0":"virtio,bridge=vmbr0,firewall=0"}' 
        ipconfig:
          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"

    # --- ÉTAPE 2 : ALLUMER LA NOUVELLE VM ---
    - name: Démarrer la nouvelle VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ newid }}"
        state: started

    # --- ÉTAPE 3 : ATTENDRE LA DISPONIBILITÉ RÉSEAU ---
    - name: Attendre que le port SSH (22) soit ouvert sur la nouvelle IP
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 15
        timeout: 300
        state: started

    - name: Ajouter la nouvelle VM à l'inventaire temporaire
      ansible.builtin.add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: nouvelles_vms
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# ==============================================================
# JEU 2 : NOUVELLE VM (Configuration par SSH)
# ==============================================================
- name: Configuration de l'environnement étudiant
  hosts: nouvelles_vms
  remote_user: "etudiant"
  become: true
  gather_facts: false

  tasks:
    - name: Attendre que SSH soit totalement prêt
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Collecter les facts maintenant que SSH est OK
      ansible.builtin.setup:

    - name: Installer les paquets pour l'étudiant
      ansible.builtin.apt:
        name:
          - git
          - curl
          - vim
          - htop
          - python3-pip
        state: present
        update_cache: true

    - name: Message final
      ansible.builtin.debug:
        msg: "✅ VM étudiante prête sur {{ ansible_default_ipv4.address }}"

# ==============================================================
# JEU 3 : GUACAMOLE (Création des accès web pour l'étudiant)
# ==============================================================
- name: Intégration de la VM dans la passerelle Guacamole
  hosts: localhost
  connection: local
  gather_facts: false

  # === VARIABLES EN DUR POUR LE TEST ===
  # (À supprimer quand on passera par le formulaire AWX)
  vars:
    vmid_etudiant: "50"
    guac_url: "http://172.16.180.250:8080/guacamole"
    guac_admin: "guacadmin"
    guac_pass: "guacadmin" # Mets ton nouveau mdp si tu l'as changé
  # =====================================

  tasks:
    - name: 1. Créer la connexion SSH vers la nouvelle VM
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "Connexion_SSH_VM_{{ vmid_etudiant }}"
        protocol: "ssh"
        hostname: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        username: "etudiant"
        password: "password123"
        validate_certs: false
        state: present

    - name: 2. Créer le compte étudiant et lui lier sa connexion
      scicore.guacamole.guacamole_user:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        username: "etu_{{ vmid_etudiant }}"
        password: "password123"
        allowed_connections: 
          - "Connexion_SSH_VM_{{ vmid_etudiant }}"
        validate_certs: false
        state: present