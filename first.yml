---
# ==============================================================
# JEU 1 : PROXMOX (Création des machines depuis AWX)
# ==============================================================
- name: Déploiement Cloud Étudiant - Phase Création
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # vmid_etudiant et choix_os sont injectés par le Survey AWX
    template_linux: 106
    template_windows: 103
  
  tasks:
    - name: Installer proxmoxer (le traducteur Python pour l'API)
      pip:
        name: proxmoxer
        state: present

    # ==========================================================
    # BLOC LINUX
    # ==========================================================
    - name: "[Linux] Cloner la VM Template (Création seule)"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ template_linux }}"
        clone: "VMtest"
        newid: "200{{ vmid_etudiant }}"
        validate_certs: false
        name: "VM-{{ vmid_etudiant }}-LINUX"
        full: false
        state: present
        ciuser: "etu"
        cipassword: "etu"
        net: '{"net0":"virtio,bridge=vmbr0,firewall=0"}'
        force: true
      when: "'Linux' in choix_os"

    - name: "[Linux] Injecter l'IP dans la config du clone"
      ansible.builtin.uri:
        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/200{{ vmid_etudiant }}/config"
        method: POST
        headers:
          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"
        body_format: form-urlencoded
        body:
          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"
        validate_certs: false
        status_code: 200
      when: "'Linux' in choix_os"

    - name: "[Linux] Regénérer le disque Cloud-Init"
      ansible.builtin.uri:
        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/200{{ vmid_etudiant }}/cloudinit"
        method: PUT
        headers:
          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"
        validate_certs: false
        status_code: 200
      when: "'Linux' in choix_os"

    - name: "[Linux] Démarrer la nouvelle VM"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "200{{ vmid_etudiant }}"
        validate_certs: false
        state: started
      when: "'Linux' in choix_os"

    - name: "[Linux] Attendre que le port SSH (22) soit ouvert"
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 15
        timeout: 300
        state: started
      when: "'Linux' in choix_os"

    # ==========================================================
    # BLOC WINDOWS
    # ==========================================================
    - name: "[Windows] Cloner la VM Template (Création seule)"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ template_windows }}"
        clone: "WIN10-TEMPLATE"
        newid: "300{{ vmid_etudiant }}"
        validate_certs: false
        name: "VM-{{ vmid_etudiant }}-WIN"
        full: false
        state: present
        ciuser: "etu"
        cipassword: "etu"
        net: '{"net0":"virtio,bridge=vmbr0,firewall=0"}'
        force: true
      when: "'Windows' in choix_os"

    - name: "[Windows] Injecter l'IP dans la config du clone"
      ansible.builtin.uri:
        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/300{{ vmid_etudiant }}/config"
        method: POST
        headers:
          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"
        body_format: form-urlencoded
        body:
          ipconfig0: "ip=172.16.206.{{ vmid_etudiant }}/16,gw=172.16.1.213"
        validate_certs: false
        status_code: 200
      when: "'Windows' in choix_os"

    - name: "[Windows] Regénérer le disque Cloud-Init"
      ansible.builtin.uri:
        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/300{{ vmid_etudiant }}/cloudinit"
        method: PUT
        headers:
          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"
        validate_certs: false
        status_code: 200
      when: "'Windows' in choix_os"

    - name: "[Windows] Démarrer la nouvelle VM"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "300{{ vmid_etudiant }}"
        validate_certs: false
        state: started
      when: "'Windows' in choix_os"

    - name: "[Windows] Attendre que le port RDP (3389) soit ouvert (Sysprep en cours...)"
      ansible.builtin.wait_for:
        host: "172.16.206.{{ vmid_etudiant }}"
        port: 3389
        delay: 30        
        timeout: 600     
        state: started
      when: "'Windows' in choix_os"

# ==============================================================
# JEU 2 : GUACAMOLE (Création des accès web pour l'étudiant)
# ==============================================================
- name: Intégration des VMs dans la passerelle Guacamole
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    guac_url: "http://172.16.180.250:8080/guacamole"
    guac_admin: "guacadmin"
    guac_pass: "guacadmin"

  tasks:
    - name: "[Guacamole] Créer la connexion SSH (Linux)"
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "SSH_Linux_{{ vmid_etudiant }}"
        protocol: "ssh"
        hostname: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        username: "etu"
        password: "etu"
        validate_certs: false
        state: present
      when: "'Linux' in choix_os"

    - name: "[Guacamole] Créer la connexion RDP (Windows)"
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "RDP_Windows_{{ vmid_etudiant }}"
        protocol: "rdp"
        hostname: "172.16.206.{{ vmid_etudiant }}"
        port: 3389
        username: "etu"
        password: "etu"
        rdp_security: "nla"
        rdp_ignore_server_certs: true
        validate_certs: false
        state: present
      when: "'Windows' in choix_os"

    - name: "[Guacamole] Créer le compte étudiant et lui lier ses connexions"
      scicore.guacamole.guacamole_user:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        username: "etu_{{ vmid_etudiant }}"
        password: "etu"
        allowed_connections:
          - "SSH_Linux_{{ vmid_etudiant }}"
          - "RDP_Windows_{{ vmid_etudiant }}"
        validate_certs: false
        state: present