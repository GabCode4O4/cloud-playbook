---
# ==============================================================
# PHASE 1 : PROXMOX - Création des machines à la demande
# ==============================================================
- name: Déploiement Infrastructure Étudiant
  hosts: localhost
  connection: local
  gather_facts: false
- name: "Installer la dépendance proxmoxer"
        ansible.builtin.pip:
          name: proxmoxer
          state: present

  vars:
    # Les variables vmid_etudiant (int) et choix_os (list) 
    # sont injectées dynamiquement par le Survey AWX.
    
    # Configuration des IDs de vos templates
    template_linux_id: 106
    template_windows_id: 110

  tasks:
    # --- SECTION LINUX ---
    - name: "[Linux] Cloner le template Ubuntu"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ template_linux_id }}"
        newid: "200{{ vmid_etudiant }}"
        name: "VM-{{ vmid_etudiant }}-LINUX"
        clone: "VMtest"
        full: false
        validate_certs: false
        ipconfig:
          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"
        state: started
      when: "'Linux' in choix_os"

    # --- SECTION WINDOWS ---
    - name: "[Windows] Cloner le template Windows 10"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ template_windows_id }}"
        newid: "300{{ vmid_etudiant }}"
        name: "VM-{{ vmid_etudiant }}-WIN"
        clone: "WIN10-TEMPLATE"
        full: false
        validate_certs: false
        # Nécessite Cloudbase-Init installé sur le template
        ipconfig:
          ipconfig0: "ip=172.16.206.{{ vmid_etudiant }}/16,gw=172.16.1.213"
        state: started
      when: "'Windows' in choix_os"

# ==============================================================
# PHASE 2 : GUACAMOLE - Configuration des accès distants
# ==============================================================
- name: Configuration de la passerelle Guacamole
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    guac_url: "http://172.16.180.250:8080/guacamole"
    guac_admin: "guacadmin"
    guac_pass: "guacadmin"

  tasks:
    - name: "[Guacamole] Créer la connexion SSH pour Linux"
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "SSH_Linux_{{ vmid_etudiant }}"
        protocol: "ssh"
        hostname: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        username: "etu"
        password: "password123"
        state: present
      when: "'Linux' in choix_os"

    - name: "[Guacamole] Créer la connexion RDP pour Windows"
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "RDP_Windows_{{ vmid_etudiant }}"
        protocol: "rdp"
        hostname: "172.16.206.{{ vmid_etudiant }}"
        port: 3389
        username: "etu"
        password: "password123"
        parameters:
          security: "nla"
          ignore-cert: "true"
        state: present
      when: "'Windows' in choix_os"

    - name: "[Guacamole] Créer/Mettre à jour le compte étudiant"
      scicore.guacamole.guacamole_user:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        username: "etu_{{ vmid_etudiant }}"
        password: "password_par_defaut"
        # On liste les deux, Guacamole fera le lien si elles existent
        allowed_connections:
          - "SSH_Linux_{{ vmid_etudiant }}"
          - "RDP_Windows_{{ vmid_etudiant }}"
        state: present