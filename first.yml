---
- name: Déploiement Cloud Étudiant
  hosts: all
  gather_facts: false
  
  tasks:
    - name: Check Python dependencies
      pip:
        name: proxmoxer
        state: present

    - name: Cloner la VM Template
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: 102
        newid: "{{ newid }}"
        name: "{{ new_vm_name }}"
        clone: true 
        full: true
        timeout: 600
        ciuser: "etudiant"
        cipassword: "password123" 
        ipconfig:
          ipconfig0: "ip=dhcp"
        state: present