---
- name: Déployer une nouvelle VM pour un étudiant
  hosts: all
  gather_facts: false
  
  tasks:
    - name: Clonage de la VM 100 vers 201
      community.general.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_api_user }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: 100                 # L'ID que l'on voit sur ta capture
        newid: 201                # La nouvelle VM sera la 201
        name: "VM-ETUDIANT-SUCCESS"
        clone: true
        full: true
        timeout: 600
        state: present