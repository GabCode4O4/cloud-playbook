---
# ==============================================================
# JEU 1 : PROXMOX (Création de la machine depuis AWX)
# ==============================================================
# --- ÉTAPE 1 : CLONER ET CONFIGURER (SANS ALLUMER) ---
    - name: Cloner la VM Template et injecter Cloud-Init
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: 102
        clone: "VMtest"
        newid: "{{ newid }}"
        name: "{{ new_vm_name }}"
        full: false
        state: present
        ciuser: "etudiant"
        cipassword: "password123"
        
        # CORRECTION : Le pare-feu s'active sur la carte réseau (net0) reliée au bridge vmbr0
        net: '{"net0":"virtio,bridge=vmbr0,firewall=1"}' 
        
        ipconfig:
          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"

    # --- ÉTAPE 2 : ALLUMER LA NOUVELLE VM ---
    - name: Démarrer la nouvelle VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ newid }}"
        state: started

    # --- ÉTAPE 3 : ATTENDRE LA DISPONIBILITÉ RÉSEAU ---
    - name: Attendre que le port SSH (22) soit ouvert sur la nouvelle IP
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 15
        timeout: 300
        state: started

    - name: Ajouter la nouvelle VM à l'inventaire temporaire
      ansible.builtin.add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: nouvelles_vms
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'


# ==============================================================
# JEU 2 : NOUVELLE VM (Configuration par SSH)
# ==============================================================
- name: Configuration de l'environnement étudiant
  hosts: nouvelles_vms
  remote_user: "etudiant"
  become: true
  gather_facts: false

  tasks:
    - name: Attendre que SSH soit totalement prêt
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Collecter les facts maintenant que SSH est OK
      ansible.builtin.setup:

    - name: Installer les paquets pour l'étudiant
      ansible.builtin.apt:
        name:
          - git
          - curl
          - vim
          - htop
          - python3-pip
        state: present
        update_cache: true

    - name: Message final
      ansible.builtin.debug:
        msg: "✅ VM étudiante prête sur {{ ansible_default_ipv4.address }}"