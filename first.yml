---
# ==============================================================
# JEU 1 : PROXMOX (Création de la machine depuis AWX)
# ==============================================================
- name: Déploiement Cloud Étudiant - Phase Création
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vmid_etudiant: "50"                      
    newid: "250"
    new_vm_name: "VM-{{ vmid_etudiant }}"                              
  
  tasks:
    - name: Installer proxmoxer (le traducteur Python pour l'API)
      pip:
        name: proxmoxer
        state: present

    - name: Cloner la VM Template et injecter Cloud-Init
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: 106
        clone: "VMtest"
        newid: "{{ newid }}"
        validate_certs: false
        name: "{{ new_vm_name }}"
        full: false
        state: present
        ciuser: "root"
        cipassword: "password123"
        net: '{"net0":"virtio,bridge=vmbr0,firewall=0"}'
        ipconfig:
          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"
        force: true

    - name: Injecter l'IP dans la config du clone
      ansible.builtin.uri:
        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/{{ newid }}/config"
        method: POST
        headers:
          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"
        body_format: form-urlencoded
        body:
          ipconfig0: "ip=172.16.205.{{ vmid_etudiant }}/16,gw=172.16.1.213"
        validate_certs: false
        status_code: 200

    - name: Regénérer le disque Cloud-Init
      ansible.builtin.uri:
        url: "https://{{ pve_api_host }}:8006/api2/json/nodes/exbasis/qemu/{{ newid }}/cloudinit"
        method: PUT
        headers:
          Authorization: "PVEAPIToken=root@pam!{{ pve_api_token_id }}={{ pve_api_token_secret }}"
        validate_certs: false
        status_code: 200

    - name: Démarrer la nouvelle VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "root@pam"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        node: "exbasis"
        vmid: "{{ newid }}"
        validate_certs: false
        state: started

    - name: Attendre que le port SSH (22) soit ouvert sur la nouvelle IP
      ansible.builtin.wait_for:
        host: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        delay: 15
        timeout: 300
        state: started

    - name: Ajouter la nouvelle VM à l'inventaire temporaire
      ansible.builtin.add_host:
        name: "172.16.205.{{ vmid_etudiant }}"
        groups: nouvelles_vms
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o PasswordAuthentication=yes'
        ansible_ssh_pass: "password123"
        ansible_become_pass: "password123"

# ==============================================================
# JEU 2 : NOUVELLE VM (Configuration par SSH)
# ==============================================================
- name: Configuration de l'environnement étudiant
  hosts: nouvelles_vms
  remote_user: "root"
  become: false
  gather_facts: false

  vars:
    ansible_ssh_pass: "password123"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o PasswordAuthentication=yes'

  tasks:
    - name: Attendre la fin de Cloud-Init et Bootstraper python3-apt via raw
      ansible.builtin.raw: |
        /usr/bin/cloud-init status --wait
        /usr/bin/apt-get update && /usr/bin/apt-get install -y python3-apt
      changed_when: false

    - name: Collecter les facts
      ansible.builtin.setup:

    - name: Installer sudo et les paquets nécessaires
      ansible.builtin.apt:
        name:
          - sudo
        state: present
        update_cache: true

    - name: Créer le user etudiant
      ansible.builtin.user:
        name: etudiant
        password: "{{ 'password123' | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: true
        groups: sudo
        append: true

    - name: Autoriser etudiant sans mot de passe sudo
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/etudiant
        line: "etudiant ALL=(ALL) NOPASSWD:ALL"
        create: true
        mode: '0440'

    - name: Message final
      ansible.builtin.debug:
        msg: "✅ VM étudiante prête sur {{ ansible_default_ipv4.address }}"
# ==============================================================
# JEU 3 : GUACAMOLE (Création des accès web pour l'étudiant)
# ==============================================================
- name: Intégration de la VM dans la passerelle Guacamole
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vmid_etudiant: "50"
    guac_url: "http://172.16.180.250:8080/guacamole"
    guac_admin: "guacadmin"
    guac_pass: "guacadmin"

  tasks:
    - name: 1. Créer la connexion SSH vers la nouvelle VM
      scicore.guacamole.guacamole_connection:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        connection_name: "Connexion_SSH_VM_{{ vmid_etudiant }}"
        protocol: "ssh"
        hostname: "172.16.205.{{ vmid_etudiant }}"
        port: 22
        username: "etudiant"
        password: "password123"
        validate_certs: false
        state: present

    - name: 2. Créer le compte étudiant et lui lier sa connexion
      scicore.guacamole.guacamole_user:
        base_url: "{{ guac_url }}"
        auth_username: "{{ guac_admin }}"
        auth_password: "{{ guac_pass }}"
        username: "etu_{{ vmid_etudiant }}"
        password: "password123"
        allowed_connections:
          - "Connexion_SSH_VM_{{ vmid_etudiant }}"
        validate_certs: false
        state: present