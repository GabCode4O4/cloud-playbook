---
- name: newVM
  hosts: all
  gather_facts: false
  
  tasks:
    - name: Installer proxmoxer (le traducteur Python)
      pip:
        name: proxmoxer
        state: present

    - name: 101 vers 201
      community.proxmox.proxmox_kvm:
        api_host: "{{pve_api_host}}"
        api_user: "{{pve_api_user}}"
        api_token_id: "{{pve_api_token_id}}"
        api_token_secret: "{{pve_api_token_secret}}"
        node: "exbasis"
        vmid: 102                
        newid: 201                
        name: "VM"
        clone: true
        full: true
        timeout: 600
        state: present